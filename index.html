<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background-color: #f4f4f4;
      color: #333;
    }

    header {
      background: #0077cc;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #005fa3;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 20px;
      margin: 10px;
      background: white;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #0077cc;
      color: white;
      margin-top: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to My Website</h1>
    <p>This is my personal website</p>
  </header>

  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="container">

    <section id="home">
      <h2>Home</h2>
      <p>This is the home section of your website.</p>
    </section>

    <section id="about">
      <h2>About Me</h2>
      <p>Write something about yourself here.</p>
    </section>

    <section id="services">
      <h2>Services</h2>
      <p>List the services you offer.</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>Email: yourname@example.com</p>
    </section>

  </div>

  <footer>
    <p>&copy; 2026 My Website. All rights reserved.</p>
  </footer>

</body>
</html>
